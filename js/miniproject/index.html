<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <h1>My To-Do List</h1>

        <!-- Add Task Form -->
        <form id="todo-form">
            <input
                type="text"
                id="todo-input"
                placeholder="What needs to be done?"
                required
            >
            <button type="submit">Add</button>
        </form>

        <!-- Filter Buttons -->
        <div class="filters">
            <button
                type="button"
                class="filter active"
                data-filter="all">
                All
            </button>

            <button
                type="button"
                class="filter"
                data-filter="active">
                Active
            </button>

            <button
                type="button"
                class="filter"
                data-filter="completed">
                Completed
            </button>
        </div>

        <!-- To-Do List -->
        <ul id="todo-list">

            <!-- Tasks will be created using JavaScript -->

        </ul>

        <!-- Statistics -->
        <div class="stats">
            <span id="items-left">0 items left</span>

            <button
                type="button"
                id="clear-completed">
                Clear Completed
            </button>
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
